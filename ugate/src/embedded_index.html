<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>uGate - From UART to the world</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app" class="app"></div>
<script>
const S={page:'login',ws:null,connected:false,status:{},config:null,stream:[],loginErr:'',password:'',hexView:false,net:null,wifi:{networks:[],scanning:false,status:null},ntp:null,routes:null,wanIfaces:null,newRoute:{name:'',target:'',netmask:'255.255.255.0',gateway:'',interface:'wan'},pendingChanges:false,sys:{version:null,updateInfo:null,checkingUpdate:false,upgradeUrl:''}};
function $(s,p){return(p||document).querySelector(s)}
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else if(k==='cls')el.className=v;
    else el.setAttribute(k,v);
  });
  ch.flat().forEach(c=>el.append(typeof c==='string'?c:c));
  return el;
}
function render(){
  const root=$('#app');root.innerHTML='';
  if(S.page==='login'){renderLogin(root);return}
  const pg=S.page;
  root.append(
    h('header',{},h('h1',{},'uGate - From UART to the world'),h('span',{},h('span',{cls:'dot '+(S.connected?'on':'off')}),'WS')),
    renderNav(),
    pg==='status'?renderStatus():pg==='config'?renderConfig():pg==='network'?renderNetwork():pg==='routing'?renderRouting():pg==='toolbox'?renderToolbox():pg==='uart'?renderUart():pg==='system'?renderSystem():h('div',{})
  );
}
function renderLogin(root){
  const inp=h('input',{type:'password',placeholder:'Mật khẩu',value:S.password,oninput:e=>S.password=e.target.value,onkeydown:e=>{if(e.key==='Enter')doLogin()}});
  root.append(h('div',{cls:'login'},h('h1',{style:'color:#38bdf8;font-size:1.5rem'},'uGate - From UART to the world'),inp,
    h('button',{onclick:doLogin},'Đăng nhập'),
    S.loginErr?h('div',{cls:'error'},S.loginErr):h('span',{})
  ));
  setTimeout(()=>inp.focus(),100);
}
async function doLogin(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:S.password})});
  if(r.ok){S.page='status';S.loginErr='';connectWS();render()}
  else{S.loginErr='Sai mật khẩu';render()}
}
function renderNav(){
  const tabs=[['status','Status'],['config','Channels'],['uart','UART'],['network','Network'],['routing','Routing'],['toolbox','Toolbox'],['system','System']];
  return h('nav',{},...tabs.map(([id,label])=>h('button',{cls:S.page===id?'active':'',onclick:()=>{S.page=id;render()}},label)));
}
// --- Status page ---
function pbar(id,label,val,max,color,text){
  const pct=max>0?Math.min(100,val/max*100):0;
  // Reuse existing fill element for smooth transition
  const existing=document.querySelector('[data-pbar="'+id+'"]');
  if(existing){
    existing.style.width=pct+'%';existing.style.background=color;
    const sp=existing.closest('.pbar-row').querySelector('span');if(sp)sp.textContent=text;
    return existing.closest('.pbar-row');
  }
  const fill=h('div',{cls:'fill','data-pbar':id,style:'width:0%;background:'+color});
  setTimeout(()=>{fill.style.width=pct+'%'},20);
  return h('div',{cls:'pbar-row'},
    h('label',{},label),
    h('div',{cls:'pbar'},fill),
    h('span',{},text)
  );
}
function chBadge(state,enabled){
  if(enabled===false)return h('span',{cls:'ch-badge disabled'},'off');
  if(state==='connected')return h('span',{cls:'ch-badge connected'},'connected');
  if(state==='waiting')return h('span',{cls:'ch-badge disconnected'},'waiting');
  if(state==='disabled')return h('span',{cls:'ch-badge disabled'},'off');
  return h('span',{cls:'ch-badge disconnected'},state||'disconnected');
}
function renderWifiStatus(){
  if(!S.wifi.status){loadWifiStatus().then(render);return h('div',{})}
  const ws=S.wifi.status;
  if(ws.mode==='off')return h('div',{});
  const sta=ws.sta||{};const ap=ws.ap||{};
  const items=[];
  items.push(lbl('Chế độ'),h('span',{},ws.mode==='sta'?'STA':ws.mode==='ap'?'AP':'STA + AP'));
  if(ws.mode!=='ap'){
    const staVal=sta.connected
      ?h('span',{style:'display:flex;align-items:center;gap:6px;color:#22c55e'},signalBars(sta.signal),sta.ssid||sta.config_ssid,' ',sta.signal+' dBm')
      :h('span',{style:'color:#ef4444'},sta.config_ssid?'Ngắt — "'+sta.config_ssid+'"':'Chưa cấu hình');
    items.push(lbl('STA'),staVal);
    if(sta.connected)items.push(lbl('IP'),h('span',{},sta.ip||'-'));
  }
  if(ws.mode!=='sta'){
    items.push(lbl('AP'),h('span',{style:'color:'+(ap.active?'#22c55e':'#64748b')},ap.active?ap.ssid:'Tắt'));
  }
  return h('div',{cls:'card'},h('h3',{},'WiFi'),h('div',{cls:'cf'},...items));
}
function renderStatus(){
  const s=S.status||{};const u=s.uart||{};const m=s.mqtt||{};const hp=s.http||{};const t=s.tcp||{};const g=s.gpio||[];
  const cpu=s.cpu||0;const ru=s.ram_used||0;const rt=s.ram_total||0;
  function badge(ch,state,enabled){
    const cls=enabled===false||state==='disabled'?'disabled':state==='connected'?'connected':'disconnected';
    const txt=enabled===false?'off':state||'disconnected';
    return h('span',{cls:'ch-badge '+cls,'data-badge':ch},txt);
  }
  return h('div',{},
    h('div',{cls:'card'},h('h3',{},'Hệ thống'),
      h('div',{cls:'sys-info cf',style:'grid-template-columns:auto 1fr auto 1fr auto 1fr'},
        lbl('Phiên bản'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'ver'},s.version||'-'),
        lbl('Uptime'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'up'},s.uptime||'-'),
        lbl('Thời gian'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'dt'},s.datetime||'-')
      ),
      pbar('cpu','CPU',cpu,100,cpu>80?'#ef4444':cpu>50?'#f59e0b':'#22c55e',cpu+'%'),
      pbar('ram','RAM',ru,rt,ru/rt>0.8?'#ef4444':ru/rt>0.5?'#f59e0b':'#22c55e',ru+'/'+rt+' MB')
    ),
    h('div',{cls:'card'},
      h('h3',{},'Kênh truyền',
        h('div',{cls:'ch-badges',style:'display:flex;gap:6px;flex-wrap:wrap'},
          h('span',{cls:'ch-lbl',style:'font-size:.7rem;color:#64748b'},'MQTT:'),badge('mqtt',m.state,m.enabled),
          h('span',{cls:'ch-lbl',style:'font-size:.7rem;color:#64748b;margin-left:6px'},'HTTP:'),badge('http',hp.state,hp.enabled),
          h('span',{cls:'ch-lbl',style:'font-size:.7rem;color:#64748b;margin-left:6px'},'TCP:'),badge('tcp',t.state,t.enabled)
        )
      ),
      h('div',{cls:'cf'},
        lbl('UART RX'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'urx'},''+(u.rx_frames??0)+' fr / '+(u.rx_bytes??0)+' B'),
        lbl('UART TX'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'utx'},''+(u.tx_frames??0)+' fr / '+(u.tx_bytes??0)+' B'),
        lbl('UART config'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'ucfg'},u.config||'-'),
        lbl('MQTT pub'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'mpub'},''+(m.published??0)+' ok / '+(m.failed??0)+' fail'),
        lbl('HTTP sent'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'hsnt'},''+(hp.sent??0)+' ok / '+(hp.failed??0)+' fail'),
        lbl('TCP conn'),h('span',{style:'color:#e2e8f0;font-weight:500','data-f':'tconn'},''+(t.connections??0))
      )
    ),
    renderWifiStatus(),
    h('div',{cls:'card'},h('h3',{},'GPIO'),h('div',{cls:'gpio-btns'},...[0,1,2,3].map(i=>
      h('div',{cls:'gpio-btn '+(g[i]?'on':'off'),'data-gpio':''+i,onclick:()=>sendGpio(i+1,'toggle')},'Pin '+(i+1)+'\n'+(g[i]?'ON':'OFF'))
    )))
  );
}
function updateStatus(){
  // First render: full render; subsequent: in-place update for smooth transitions
  if(!document.querySelector('[data-pbar="cpu"]')){render();return}
  const s=S.status||{};const u=s.uart||{};const m=s.mqtt||{};const hp=s.http||{};const t=s.tcp||{};const g=s.gpio||[];
  const cpu=s.cpu||0;const ru=s.ram_used||0;const rt=s.ram_total||0;
  // Update progress bars (reuse existing elements for animation)
  pbar('cpu','CPU',cpu,100,cpu>80?'#ef4444':cpu>50?'#f59e0b':'#22c55e',cpu+'%');
  pbar('ram','RAM',ru,rt,ru/rt>0.8?'#ef4444':ru/rt>0.5?'#f59e0b':'#22c55e',ru+'/'+rt+' MB');
  // Update text fields via data-field
  const f=k=>document.querySelector('[data-f="'+k+'"]');
  const set=(k,v)=>{const el=f(k);if(el)el.textContent=v};
  set('ver',s.version||'-');set('up',s.uptime||'-');set('dt',s.datetime||'-');
  set('urx',''+(u.rx_frames??0)+' frames / '+(u.rx_bytes??0)+' B');
  set('utx',''+(u.tx_frames??0)+' frames / '+(u.tx_bytes??0)+' B');
  set('ucfg',u.config||'-');
  set('mpub',''+(m.published??0)+' ok / '+(m.failed??0)+' fail');
  set('hsnt',''+(hp.sent??0)+' ok / '+(hp.failed??0)+' fail');
  set('tconn',''+(t.connections??0));
  // Update GPIO buttons
  [0,1,2,3].forEach(i=>{
    const btn=document.querySelector('[data-gpio="'+i+'"]');
    if(btn){btn.className='gpio-btn '+(g[i]?'on':'off');btn.textContent='Pin '+(i+1)+'\n'+(g[i]?'ON':'OFF')}
  });
  // Update badges
  ['mqtt','http','tcp'].forEach(ch=>{
    const el=document.querySelector('[data-badge="'+ch+'"]');
    if(!el)return;
    const obj=ch==='mqtt'?m:ch==='http'?hp:t;
    const st=obj.state;const en=obj.enabled;
    el.className='ch-badge '+(en===false||st==='disabled'?'disabled':st==='connected'?'connected':'disconnected');
    el.textContent=en===false?'off':st||'disconnected';
  });
}
// --- Config helpers (4-column grid) ---
function lbl(text){return h('span',{cls:'lbl'},text)}
function gap(){return h('div',{cls:'gap'})}
function helpLink(text,fn){return h('a',{href:'#',cls:'help-link',onclick:e=>{e.preventDefault();fn()}},text)}
function inp(type,obj,key,full){
  return h('input',{type,cls:full?'full':'',value:type==='number'?(obj[key]||0):(obj[key]||''),oninput:e=>{obj[key]=type==='number'?+e.target.value:e.target.value}});
}
function slct(obj,key,opts,full,cb){
  const s=h('select',{cls:full?'full':'',onchange:e=>{obj[key]=e.target.value;if(cb)cb()}});
  opts.forEach(([v,t])=>{const o=h('option',{value:v},t);if(''+obj[key]===v)o.selected=true;s.append(o)});
  return s;
}
function swTog(obj,key){
  return h('label',{cls:'sw'},h('input',{type:'checkbox',...(obj[key]?{checked:''}:{}),onchange:e=>{obj[key]=e.target.checked}}),h('span',{cls:'sl'}));
}
function chHdr(title,obj){
  const tog=h('input',{type:'checkbox',...(obj.enabled?{checked:''}:{}),onchange:e=>{obj.enabled=e.target.checked;render()}});
  return h('h3',{},title,h('label',{cls:'sw'},tog,h('span',{cls:'sl'})));
}
// --- Config page ---
function renderConfig(){
  if(!S.config){loadConfig();return h('div',{cls:'card'},'Đang tải...')}
  const c=S.config;
  // General
  const general=h('div',{cls:'card'},h('h3',{style:'display:flex;align-items:center;gap:8px'},'General',helpLink('Help',()=>showDataWrapHelp())),
    h('div',{cls:'cf cf-3'},
      lbl('Tên thiết bị'),inp('text',c.general,'device_name'),
      lbl('Data Wrap'),h('label',{cls:'chk'},h('input',{type:'checkbox',...(c.general.wrap_json?{checked:''}:{}),onchange:e=>{c.general.wrap_json=e.target.checked;if(e.target.checked)showDataWrapHelp();render()}}),h('span',{cls:'chk-box'}),h('span',{style:'color:#e2e8f0;font-size:.85rem'},c.general.wrap_json?'Bật':'Tắt')),
      lbl('Text encoding'),h('label',{cls:'chk'},h('input',{type:'checkbox',...(c.general.data_as_text?{checked:''}:{}),onchange:e=>{c.general.data_as_text=e.target.checked;render()}}),h('span',{cls:'chk-box'}),h('span',{style:'color:#e2e8f0;font-size:.85rem'},c.general.data_as_text?'Text':'Hex'))
    ));
  // MQTT
  const mqtt=h('div',{cls:'card'},chHdr('MQTT',c.mqtt),
    ...(c.mqtt.enabled?[h('div',{cls:'cf cf-3'},
      lbl('Broker'),inp('text',c.mqtt,'broker'),lbl('Port'),inp('number',c.mqtt,'port'),lbl('TLS'),h('label',{cls:'chk'},h('input',{type:'checkbox',...(c.mqtt.tls?{checked:''}:{}),onchange:e=>{c.mqtt.tls=e.target.checked}}),h('span',{cls:'chk-box'}),h('span',{style:'color:#e2e8f0;font-size:.85rem'},c.mqtt.tls?'Bật':'Tắt')),
      lbl('Client ID'),h('input',{type:'text',value:S.status.mqtt?S.status.mqtt.client_id||'':'',readonly:'',cls:'inp',style:'opacity:.6;cursor:default',placeholder:'Chưa kết nối',title:'Tự sinh ngẫu nhiên mỗi lần kết nối'}),lbl('Username'),inp('text',c.mqtt,'username'),lbl('Mật khẩu'),inp('password',c.mqtt,'password'),
      lbl('QoS'),slct(c.mqtt,'qos',[['0','0'],['1','1'],['2','2']]),lbl('Pub Topic'),inp('text',c.mqtt,'topic'),lbl('Sub Topic'),inp('text',c.mqtt,'sub_topic')
    )]:[])
  );
  // HTTP
  const http=h('div',{cls:'card'},chHdr('HTTP',c.http),
    ...(c.http.enabled?[h('div',{cls:'cf',style:'grid-template-columns:auto 1fr auto 2fr'},
      lbl('Phương thức'),slct(c.http,'method',[['post','POST'],['get','GET']]),
      lbl('URL'),inp('text',c.http,'url')
    )]:[])
  );
  // TCP
  const tcpFields=[lbl('Chế độ'),slct(c.tcp,'mode',[['server','Server (lắng nghe)'],['client','Client (kết nối tới)']],false,()=>render())];
  if(c.tcp.mode==='server'){tcpFields.push(lbl('Cổng lắng nghe'),inp('number',c.tcp,'server_port'))}
  if(c.tcp.mode==='client'){tcpFields.push(lbl('Địa chỉ server'),inp('text',c.tcp,'client_host'),lbl('Cổng đích'),inp('number',c.tcp,'client_port'))}
  const tcp=h('div',{cls:'card'},chHdr('TCP',c.tcp),
    ...(c.tcp.enabled?[h('div',{cls:'cf'},...tcpFields)]:[])
  );
  return h('div',{},general,mqtt,http,tcp,h('button',{cls:'save-btn',onclick:saveConfig},'Lưu cấu hình'));
}
// --- UART page ---
function renderUart(){
  if(!S.config){loadConfig();return h('div',{cls:'card'},'Đang tải...')}
  const c=S.config;const fm=c.uart.frame_mode;
  const bauds=[['9600','9600'],['19200','19200'],['38400','38400'],['57600','57600'],['115200','115200'],['230400','230400'],['460800','460800'],['921600','921600']];
  const fields=[
    lbl('Baudrate'),slct(c.uart,'baudrate',bauds),lbl('Data Bits'),slct(c.uart,'data_bits',[['7','7'],['8','8']]),
    lbl('Parity'),slct(c.uart,'parity',[['none','None'],['even','Even'],['odd','Odd']]),lbl('Stop Bits'),slct(c.uart,'stop_bits',[['1','1'],['2','2']]),
    lbl('Frame Mode'),slct(c.uart,'frame_mode',[['none','None (Gap)'],['frame','Frame (Fixed)'],['modbus','Modbus RTU']],false,()=>render())
  ];
  if(fm==='none')fields.push(lbl('Gap (ms)'),inp('number',c.uart,'gap_ms'));
  if(fm==='frame'){fields.push(lbl('Frame Length'),inp('number',c.uart,'frame_length'),lbl('Frame Timeout (ms)'),inp('number',c.uart,'frame_timeout_ms'))}
  if(fm==='modbus')fields.push(lbl('Frame Timeout (ms)'),inp('number',c.uart,'frame_timeout_ms'));
  if(S._uartOpen==null)S._uartOpen=true;
  const arrow=h('span',{cls:'arrow'+(S._uartOpen?' open':''),style:'transition:transform .2s;display:inline-block;'+(S._uartOpen?'transform:rotate(90deg)':'')},'\u25B6');
  const togBtn=h('button',{cls:'collapse-btn',onclick:()=>{S._uartOpen=!S._uartOpen;render()}},arrow);
  const body=S._uartOpen?h('div',{},h('div',{cls:'cf'},...fields),h('button',{cls:'save-btn',onclick:saveConfig},'Lưu cấu hình')):h('div',{});
  return h('div',{style:'display:flex;flex-direction:column;height:calc(100vh - 120px)'},
    h('div',{cls:'card',style:'flex-shrink:0'},h('h3',{},'Cài đặt UART',togBtn),body),
    renderData());
}
async function loadConfig(){
  const r=await fetch('/api/config');if(r.ok){S.config=await r.json();render();}
}
function toast(msg,type){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.append(t)}
  t.textContent=msg;t.className='toast '+(type||'ok')+' show';
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}
async function saveConfig(){
  try{
    const r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S.config)});
    if(r.ok)toast('Đã lưu cấu hình','ok');else toast('Lưu thất bại','err');
  }catch(e){toast('Lỗi kết nối','err')}
}
function fmtRow(d){
  if(!d||!d.type)return null;
  const isRx=d.dir!=='tx';
  let content='';
  if(d.hex){
    if(S.hexView){
      content=d.hex.match(/.{1,2}/g).join(' ').toUpperCase();
    }else{
      const bytes=d.hex.match(/.{1,2}/g)||[];
      content=bytes.map(b=>{const c=parseInt(b,16);return c>=32&&c<127?String.fromCharCode(c):c===10?'':c===13?'':''}).join('');
    }
  }
  const errTag=d.err?h('span',{style:'color:#ef4444;font-size:.75rem;margin-left:4px'},'('+d.err+')'):'';
  const row=h('div',{style:'display:flex;gap:8px;padding:1px 0;border-bottom:1px solid #1e293b'},
    h('span',{style:'color:#64748b;min-width:64px'},d._ts||''),
    h('span',{style:'color:'+(isRx?'#22c55e':'#f59e0b')+';font-weight:600;min-width:20px'},isRx?'RX':'TX'),
    h('span',{style:'color:#38bdf8;min-width:28px'},'['+d.len+']'),
    h('span',{},content,errTag)
  );
  return row;
}
let _streamEl=null,_rendered=0;
function renderData(){
  // Incremental: chỉ append rows mới thay vì rebuild toàn bộ
  if(_streamEl&&S.page==='uart'){
    while(_rendered<S.stream.length){
      const row=fmtRow(S.stream[_rendered]);
      if(row)_streamEl.append(row);
      _rendered++;
    }
    _streamEl.scrollTop=_streamEl.scrollHeight;
    return _streamEl.parentElement;
  }
  _rendered=0;
  _streamEl=h('div',{cls:'stream',style:'flex:1;overflow-y:auto;min-height:0'});
  S.stream.forEach((d,i)=>{const r=fmtRow(d);if(r)_streamEl.append(r);_rendered=i+1});
  setTimeout(()=>{if(_streamEl)_streamEl.scrollTop=_streamEl.scrollHeight},10);
  const txInput=h('input',{type:'text',placeholder:'Gửi serial...',style:'flex:1;padding:2px 6px;background:transparent;color:#e2e8f0;border:none;outline:none;font-size:.8rem;font-family:monospace;min-width:0'});
  const sendTx=()=>{const v=txInput.value.trim();if(!v)return;fetch('/api/uart/tx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:v})});txInput.value='';};
  txInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendTx()});
  const toolbar=h('div',{style:'display:flex;align-items:center;gap:40px;margin-bottom:8px'},
    h('h3',{style:'margin:0;font-size:.9rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap'},'UART Real-time'),
    h('div',{style:'display:flex;align-items:center;gap:6px;flex:1;min-width:0;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:3px 4px'},
      txInput,
      h('button',{style:'padding:3px 12px;background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap',onclick:sendTx},'Gửi')
    ),
    h('label',{cls:'chk',style:'font-size:.78rem'},h('input',{type:'checkbox',...(S.hexView?{checked:''}:{}),onchange:e=>{S.hexView=e.target.checked;_streamEl=null;_rendered=0;render()}}),h('span',{cls:'chk-box'}),h('span',{style:'color:#94a3b8'},'HEX')),
    h('button',{style:'padding:3px 10px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:4px;cursor:pointer;font-size:.75rem',onclick:()=>{S.stream=[];_streamEl=null;_rendered=0;render()}},'Xoá')
  );
  return h('div',{cls:'card',style:'flex:1;display:flex;flex-direction:column;padding-bottom:8px;min-height:0;overflow:hidden'},toolbar,_streamEl);
}
// --- Network page ---
function renderNetwork(){
  if(!S.wifi.status)loadWifiStatus().then(render);
  checkPendingChanges();
  const banner=S.pendingChanges?h('div',{cls:'pending-banner',style:'background:#92400e;border:1px solid #f59e0b;border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center'},

function updateWifiModal(content,networks){
  content.innerHTML='';
  if(!networks.length){content.append(h('div',{style:'color:#94a3b8;text-align:center;padding:20px'},'Không tìm thấy WiFi nào'));return}
  networks.sort((a,b)=>b.signal-a.signal);
  networks.forEach(n=>{
    content.append(h('div',{cls:'wifi-item',onclick:()=>{
      S.wifi._staSsid=n.ssid;S.wifi._staPwd='';
      // Auto-detect encryption from scan
      const enc=n.encryption||'';
      if(enc.includes('WPA3')||enc.includes('SAE'))S.wifi._staEnc='sae';
      else if(enc.includes('mixed'))S.wifi._staEnc='psk-mixed';
      else if(enc.includes('WPA2')||enc.includes('PSK'))S.wifi._staEnc='psk2';
      else if(enc==='none'||enc==='Open')S.wifi._staEnc='none';
      document.getElementById('wifi-modal').remove();
      render();
    }},
      h('div',{},h('div',{style:'color:#e2e8f0;font-weight:500'},n.ssid),h('div',{style:'color:#64748b;font-size:.75rem'},n.encryption)),
      h('div',{style:'display:flex;align-items:center;gap:8px'},signalBars(n.signal),h('span',{style:'color:#64748b;font-size:.75rem'},n.signal+' dBm'))
    ));
  });
}

// Network API calls
async function scanWifi(){
  const content=showWifiModal();
  content.append(h('div',{cls:'spinner'}),h('div',{style:'text-align:center;color:#94a3b8;margin-top:8px'},'Đang quét...'));
  try{const r=await fetch('/api/wifi/scan');if(r.ok){const d=await r.json();S.wifi.networks=d.networks||[];updateWifiModal(content,S.wifi.networks)}else{content.innerHTML='';content.append(h('div',{style:'color:#ef4444;text-align:center;padding:20px'},'Lỗi quét WiFi'))}}
  catch(_){content.innerHTML='';content.append(h('div',{style:'color:#ef4444;text-align:center;padding:20px'},'Lỗi kết nối'))}
}
async function loadWifiStatus(){
  try{const r=await fetch('/api/wifi/status');if(r.ok){S.wifi.status=await r.json();S.wifi._mode=null;S.wifi._staSsid=null;S.wifi._staPwd=null;S.wifi._staEnc=null;S.wifi._apSsid=null;S.wifi._apKey=null;S.wifi._apEnc=null;S.wifi._apCh=null;return}}catch(_){}
  if(!S.wifi.status)S.wifi.status={mode:'sta_ap',sta:{connected:false,ssid:'',config_ssid:'',signal:0,ip:''},ap:{active:false,ssid:'',encryption:'',key:'',channel:''}};
}
async function connectWifi(ssid,pwd){
  try{
    const r=await fetch('/api/wifi/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid,password:pwd,encryption:'psk2'})});
    if(r.ok){toast('Đang kết nối WiFi...','ok');S.wifi._sel=null;setTimeout(()=>{loadWifiStatus().then(render)},5000)}
    else toast('Lỗi kết nối','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function disconnectWifi(){
  try{await fetch('/api/wifi/disconnect',{method:'POST'});toast('Đang ngắt WiFi...','ok');setTimeout(()=>{loadWifiStatus().then(render)},5000)}catch(_){}
}
async function saveWifiMode(mode,w){
  const body={mode};
  if(mode==='sta'||mode==='sta_ap'){
    if(w._staSsid)body.sta_ssid=w._staSsid;
    body.sta_password=w._staPwd||'';
  }
  if(mode==='ap'||mode==='sta_ap'){
    if(w._apSsid)body.ap_ssid=w._apSsid;
    body.ap_password=w._apKey||'';
    if(w._apCh)body.ap_channel=w._apCh;
  }
  try{
    const r=await fetch('/api/wifi/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){toast('Đã lưu chế độ WiFi (draft)','ok');S.pendingChanges=true;setTimeout(()=>{loadWifiStatus().then(render)},2000)}
    else toast('Lỗi lưu chế độ WiFi','err');
  }catch(_){toast('Lỗi kết nối','err')}
}

async function loadNetwork(){
  try{const r=await fetch('/api/network');if(r.ok){S.net=await r.json();render();return}}catch(_){}
  S.net={lan:{name:'lan',proto:'dhcp',ipaddr:'',netmask:'255.255.255.0',gateway:'',dns:[]},wan:{name:'wan',proto:'dhcp',ipaddr:'',netmask:'255.255.255.0',gateway:'',dns:[]}};render();
}
async function saveNetwork(){
  const w=S.net.wan;const body={interface:'wan',proto:w.proto};
  if(w.proto==='static'){body.ipaddr=w.ipaddr;body.netmask=w.netmask;body.gateway=w.gateway;body.dns=w._dns||''}
  try{
    const r=await fetch('/api/network',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){toast('Lỗi lưu WAN','err');return}
  }catch(_){toast('Lỗi kết nối','err');return}
  S.pendingChanges=true;toast('Đã lưu nháp (RAM)','ok');render();
}
async function saveMetrics(){
  if(!S.wanIfaces)return;
  for(const ifc of S.wanIfaces){
    try{await fetch('/api/interface/metric',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({interface:ifc.uci,metric:+(ifc._metric||0)})})}catch(_){}
  }
  S.pendingChanges=true;toast('Đã lưu nháp (RAM). Ấn "Áp dụng" để ghi flash.','ok');render();

    h('button',{cls:'save-btn',onclick:addRoute},'Thêm route')
  );
}
async function loadWanIfaces(){
  try{const r=await fetch('/api/wan/discover');if(r.ok){const d=await r.json();S.wanIfaces=d.interfaces||[];render();return}}catch(_){}
  S.wanIfaces=[];render();
}
async function loadRoutes(){
  try{const r=await fetch('/api/routes');if(r.ok){S.routes=await r.json();render();return}}catch(_){}
  S.routes={current_table:''};render();
}
async function addRoute(){
  const r=S.newRoute;
  if(!r.name||!r.target||!r.gateway){toast('Điền đầy đủ thông tin','err');return}
  try{
    const res=await fetch('/api/routes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)});
    if(res.ok){toast('Đã thêm route','ok');S.routes=null;S.newRoute={name:'',target:'',netmask:'255.255.255.0',gateway:'',interface:'wan'};render()}
    else{const d=await res.json();toast(d.error||'Lỗi','err')}
  }catch(_){toast('Lỗi kết nối','err')}
}
async function checkPendingChanges(){
  try{const r=await fetch('/api/network/changes');if(r.ok){const d=await r.json();const had=S.pendingChanges;S.pendingChanges=!!d.pending;if(had!==S.pendingChanges)render()}}catch(_){}
}
async function applyChanges(){
  try{
    const r=await fetch('/api/network/apply',{method:'POST'});
    if(r.ok){toast('Đã lưu vào flash, đang khởi động lại...','ok');S.pendingChanges=false;render()}
    else toast('Lỗi áp dụng','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function revertChanges(){
  try{
    const r=await fetch('/api/network/revert',{method:'POST'});
    if(r.ok){toast('Đã huỷ thay đổi','ok');S.pendingChanges=false;S.net=null;S.ntp=null;render()}
    else toast('Lỗi huỷ','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function syncNtp(){
  try{const r=await fetch('/api/ntp/sync',{method:'POST'});if(r.ok){const d=await r.json();toast('Đã đồng bộ ('+d.method+')','ok')}else toast('Lỗi sync','err')}catch(_){toast('Lỗi kết nối','err')}
}
// --- System page ---
async function loadSysVersion(){
  try{const r=await fetch('/api/version');if(r.ok){S.sys.version=await r.json();render();return}}catch(_){}
  S.sys.version={version:'-',build_date:'-',git_commit:'-'};render();
}
async function loadUpgradeUrl(){
  try{const r=await fetch('/api/upgrade/url');if(r.ok){const d=await r.json();S.sys.upgradeUrl=d.url||'';render()}}catch(_){}
}
async function saveUpgradeUrl(input){
  const url=input.value.trim();
  try{
    const r=await fetch('/api/upgrade/url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    if(r.ok){S.sys.upgradeUrl=url;toast('Đã lưu URL','ok')}else toast('Lỗi lưu URL','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function checkUpgrade(){
  S.sys.checkingUpdate=true;S.sys.updateInfo=null;render();
  try{
    const r=await fetch('/api/upgrade/check');
    if(r.ok){S.sys.updateInfo=await r.json();S.sys.checkingUpdate=false;render()}
    else{S.sys.checkingUpdate=false;toast('Lỗi kiểm tra cập nhật','err');render()}
  }catch(_){S.sys.checkingUpdate=false;toast('Lỗi kết nối','err');render()}
}
async function doRemoteUpgrade(){
  try{
    const r=await fetch('/api/upgrade/remote',{method:'POST'});
    if(r.ok)toast('Đang cài đặt firmware mới...','ok');else toast('Lỗi cài đặt','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function doUploadIpk(fileInput){
  const file=fileInput.files[0];if(!file){toast('Chọn file .ipk','err');return}
  try{
    const buf=await file.arrayBuffer();
    const r=await fetch('/api/upgrade',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:buf});
    if(r.ok)toast('Đã nâng cấp thành công','ok');else toast('Nâng cấp thất bại','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function doRestore(fileInput){
  const file=fileInput.files[0];if(!file){toast('Chọn file backup','err');return}
  try{
    const buf=await file.arrayBuffer();
    const r=await fetch('/api/restore',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:buf});
    if(r.ok)toast('Đã khôi phục cấu hình','ok');else toast('Khôi phục thất bại','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function doRestart(){
  if(!confirm('Khởi động lại thiết bị?'))return;
  try{
    const r=await fetch('/api/restart',{method:'POST'});
    if(r.ok)toast('Đang khởi động lại...','ok');else toast('Lỗi khởi động lại','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function doFactoryReset(){
  if(!confirm('Tất cả cấu hình sẽ được reset về mặc định?'))return;
  try{
    const r=await fetch('/api/factory-reset',{method:'POST'});
    if(r.ok)toast('Đang khôi phục mặc định...','ok');else toast('Lỗi khôi phục mặc định','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
function renderSystem(){
  if(!S.sys.version){loadSysVersion();loadUpgradeUrl();return h('div',{cls:'card'},'Đang tải...')}
  const v=S.sys.version;const ui=S.sys.updateInfo;
  // Section 1: Firmware info
  let ipkInput,restoreInput;
  const updateSection=[];
  if(S.sys.checkingUpdate){
    updateSection.push(h('div',{cls:'spinner'}));
  }else if(ui){
    if(ui.has_update){
      updateSection.push(
        h('div',{style:'margin-top:10px;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:6px'},
          h('div',{cls:'cf'},
            lbl('Phiên bản mới'),h('span',{},ui.version||'-'),
            lbl('Kích thước'),h('span',{},ui.size||'-'),
            lbl('Thay đổi'),h('span',{style:'grid-column:2/5;white-space:pre-wrap;font-size:.8rem;color:#94a3b8'},ui.changelog||'-')
          ),
          h('button',{cls:'save-btn',style:'background:#16a34a',onclick:doRemoteUpgrade},'Tải & Cài đặt')
        )
      );
    }else{
      updateSection.push(h('div',{style:'color:#22c55e;font-size:.85rem;margin-top:8px'},'Đã là phiên bản mới nhất'));
    }
  }
  const firmware=h('div',{cls:'card'},h('h3',{},'Firmware'),
    h('div',{cls:'fw-meta',style:'display:flex;gap:20px;align-items:center;margin-bottom:8px'},
      h('span',{style:'font-size:.85rem'},h('span',{style:'color:#64748b'},'Phiên bản: '),h('span',{style:'color:#e2e8f0'},'v'+(v.version||'-'))),
      h('span',{style:'font-size:.85rem'},h('span',{style:'color:#64748b'},'Build: '),h('span',{style:'color:#e2e8f0'},v.build_date||'-')),
      h('span',{style:'font-size:.85rem'},h('span',{style:'color:#64748b'},'Commit: '),h('span',{style:'font-family:monospace;color:#e2e8f0'},v.git_commit||'-'))
    ),
    (()=>{const inp=h('input',{type:'text',value:S.sys.upgradeUrl,placeholder:'https://example.com/ugate/latest.json',style:'flex:1;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.85rem'});return h('div',{cls:'fw-url-row',style:'display:flex;gap:8px;align-items:center;margin-top:10px'},h('span',{style:'color:#64748b;font-size:.85rem;white-space:nowrap'},'URL cập nhật'),inp,h('div',{cls:'fw-url-btns',style:'display:flex;gap:6px'},h('button',{cls:'save-btn',style:'margin:0;min-width:80px;white-space:nowrap',onclick:()=>saveUpgradeUrl(inp)},'Lưu'),h('button',{cls:'save-btn',style:'margin:0;min-width:140px;background:#334155;white-space:nowrap',onclick:checkUpgrade},'Kiểm tra cập nhật')))})(),
    ...updateSection
  );
  // Section 2: Upload IPK
  const ipkFile=h('input',{type:'file',accept:'.ipk',style:'display:none'});
  const ipkLabel=h('span',{style:'color:#94a3b8;font-size:.85rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'},'Chưa chọn file');
  const ipkChooseBtn=h('button',{cls:'save-btn',style:'margin:0;background:#334155;white-space:nowrap',onclick:()=>ipkFile.click()},'Chọn file');
  ipkFile.onchange=()=>{ipkLabel.textContent=ipkFile.files[0]?.name||'Chưa chọn file';};
  const uploadIpk=h('div',{cls:'card'},h('h3',{},'Nâng cấp IPK'),
    h('div',{cls:'ipk-row',style:'display:flex;gap:8px;align-items:center'},
      ipkFile,ipkChooseBtn,ipkLabel,
      h('button',{cls:'save-btn',style:'margin:0;white-space:nowrap',onclick:()=>doUploadIpk(ipkFile)},'Nâng cấp')
    )
  );
  // Section 3: Backup / Restore
  const restoreFile=h('input',{type:'file',accept:'.config',style:'display:none'});
  const restoreLabel=h('span',{style:'color:#94a3b8;font-size:.85rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'},'Chưa chọn file');
  const restoreChooseBtn=h('button',{cls:'save-btn',style:'margin:0;background:#334155;white-space:nowrap',onclick:()=>restoreFile.click()},'Chọn file');
  restoreFile.onchange=()=>{restoreLabel.textContent=restoreFile.files[0]?.name||'Chưa chọn file';};
  const backupRestore=h('div',{cls:'card'},h('h3',{},'Sao lưu / Khôi phục'),
    h('div',{cls:'bkrs-grid',style:'display:grid;grid-template-columns:1fr 1fr;gap:10px'},
      h('button',{cls:'save-btn',style:'margin:0;white-space:nowrap;justify-self:start',onclick:()=>{window.location.href='/api/backup'}},'Tải backup'),
      h('div',{cls:'bkrs-row',style:'display:flex;gap:8px;align-items:center'},
        restoreFile,restoreChooseBtn,restoreLabel,
        h('button',{cls:'save-btn',style:'margin:0;white-space:nowrap',onclick:()=>doRestore(restoreFile)},'Khôi phục')
      )
    )
  );
  // Section 4: System actions
  const actions=h('div',{cls:'card'},h('h3',{},'Hành động hệ thống'),
    h('div',{cls:'act-btns',style:'display:flex;gap:10px;flex-wrap:wrap;justify-content:center'},
      h('button',{cls:'save-btn',style:'margin:0;min-width:160px;background:#b45309',onclick:doRestart},'Khởi động lại'),
      h('button',{cls:'save-btn',style:'margin:0;min-width:160px;background:#991b1b',onclick:doFactoryReset},'Khôi phục mặc định')
    )
  );
  // Section 5: Change password
  const inputSt='flex:1;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.85rem';
  const oldPw=h('input',{type:'password',placeholder:'Mật khẩu hiện tại',style:inputSt});
  const newPw=h('input',{type:'password',placeholder:'Mật khẩu mới (tối thiểu 4 ký tự)',style:inputSt});
  const confirmPw=h('input',{type:'password',placeholder:'Nhập lại mật khẩu mới',style:inputSt});
  const pwCard=h('div',{cls:'card'},h('h3',{},'Đổi mật khẩu'),
    h('div',{cls:'pw-row',style:'display:flex;gap:8px;align-items:center'},
      oldPw,newPw,confirmPw,
      h('button',{cls:'save-btn',style:'margin:0;white-space:nowrap',onclick:async()=>{
        if(!newPw.value||newPw.value.length<4){toast('Mật khẩu tối thiểu 4 ký tự','err');return}
        if(newPw.value!==confirmPw.value){toast('Mật khẩu nhập lại không khớp','err');return}
        try{const r=await fetch('/api/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:oldPw.value,new_password:newPw.value})});
        if(r.ok){toast('Đã đổi mật khẩu','ok');oldPw.value='';newPw.value='';confirmPw.value=''}else{const d=await r.json();toast(d.error||'Lỗi','err')}}catch(_){toast('Lỗi kết nối','err')}
      }},'Lưu')
    )
  );
  return h('div',{},firmware,uploadIpk,backupRestore,pwCard,actions);
}
// --- Toolbox page ---
let _tbEl=null,_tbR=0;
function renderToolbox(){
  if(!S.toolbox)S.toolbox={tool:'ping',target:'',lines:[],running:false};
  const tb=S.toolbox;
  const sel=h('select',{style:'padding:8px 12px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:6px;font-size:.85rem',
    onchange:e=>{tb.tool=e.target.value}},
    ...['ping','traceroute','nslookup'].map(t=>h('option',{value:t,...(tb.tool===t?{selected:''}:{})},t)));
  const ti=h('input',{type:'text',value:tb.target,placeholder:'hostname or IP',
    style:'flex:1;padding:8px 12px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:6px;font-size:.85rem',
    oninput:e=>{tb.target=e.target.value},onkeydown:e=>{if(e.key==='Enter'&&!tb.running)tbRun()}});
  const run=h('button',{cls:'save-btn',style:'margin:0;padding:6px 16px;font-size:.8rem;'+(tb.running?'opacity:.5':''),
    onclick:()=>{if(!tb.running)tbRun()}},tb.running?'Running...':'Run');
  const stop=tb.running?h('button',{style:'padding:6px 16px;background:#dc2626;color:white;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:700',
    onclick:tbStop},'Stop'):null;
  const clr=h('button',{style:'padding:6px 16px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;cursor:pointer;font-size:.8rem',
    onclick:()=>{tb.lines=[];_tbEl=null;_tbR=0;render()}},'Clear');
  const bar=h('div',{cls:'diag-bar',style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px'},sel,ti,h('div',{cls:'diag-bar-btns',style:'display:flex;gap:8px'},run,...(stop?[stop]:[]),clr));
  _tbEl=h('div',{cls:'stream',style:'flex:1;overflow-y:auto;min-height:0'});
  tb.lines.forEach(l=>{_tbEl.append(h('div',{},l))});_tbR=tb.lines.length;
  _tbEl.scrollTop=_tbEl.scrollHeight;
  if(S._diagOpen==null)S._diagOpen=true;
  const diagArrow=h('span',{cls:'arrow',style:'transition:transform .2s;display:inline-block;'+(S._diagOpen?'transform:rotate(90deg)':'')},'\u25B6');
  const diagTog=h('button',{cls:'collapse-btn',onclick:()=>{S._diagOpen=!S._diagOpen;render()}},diagArrow);
  const diagBody=S._diagOpen?[bar,_tbEl]:[];
  const diagCard=h('div',{cls:'card',style:'display:flex;flex-direction:column;'+(S._diagOpen?'flex:1;min-height:0;overflow:hidden':'')},h('h3',{},'Network Diagnostics',diagTog),...diagBody);
  const syslogCard=renderSyslog();
  return h('div',{style:'display:flex;flex-direction:column;height:calc(100vh - 120px)'},diagCard,syslogCard);
}
function renderToolboxStream(){
  if(!_tbEl||S.page!=='toolbox'){render();return}
  const tb=S.toolbox;
  while(_tbR<tb.lines.length){_tbEl.append(h('div',{},tb.lines[_tbR]));_tbR++}
  _tbEl.scrollTop=_tbEl.scrollHeight;
  if(!tb.running)render();
}
function isSafeTarget(s){return s.length>0&&s.length<=253&&!/^-/.test(s)&&/^[a-zA-Z0-9.\-:]+$/.test(s)}
async function tbRun(){
  const tb=S.toolbox;if(!tb.target.trim())return;
  if(!isSafeTarget(tb.target.trim())){toast('Target không hợp lệ (chỉ hostname/IP)','err');return}
  tb.lines=[];_tbEl=null;_tbR=0;tb.running=true;render();
  try{const r=await fetch('/api/toolbox/run',{method:'POST',body:JSON.stringify({tool:tb.tool,target:tb.target})});
    if(!r.ok){const d=await r.json();tb.lines.push('Error: '+(d.error||'failed'));tb.running=false;render()}}
  catch(e){tb.lines.push('Error: '+e.message);tb.running=false;render()}
}
async function tbStop(){try{await fetch('/api/toolbox/stop',{method:'POST'})}catch(_){}}

// --- Syslog viewer ---
let _slEl=null,_slR=0;
function renderSyslog(){
  if(!S.syslog)S.syslog={lines:[],running:false,filter:''};
  const sl=S.syslog;
  const fi=h('input',{type:'text',value:sl.filter,placeholder:'Filter (ví dụ: MQTT, HTTP, error...)',
    style:'flex:1;padding:8px 12px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:6px;font-size:.85rem',
    oninput:e=>{sl.filter=e.target.value;renderSyslogFiltered()}});
  const toggle=h('button',{style:'padding:6px 16px;background:'+(sl.running?'#dc2626':'#2563eb')+';color:white;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.8rem',
    onclick:()=>{sl.running?slStop():slStart()}},sl.running?'Stop':'Start');
  const clr=h('button',{style:'padding:6px 16px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;cursor:pointer;font-size:.8rem',
    onclick:()=>{sl.lines=[];_slEl=null;_slR=0;render()}},'Clear');
  const bar=h('div',{cls:'sl-bar',style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px'},fi,h('div',{cls:'sl-bar-btns',style:'display:flex;gap:8px'},toggle,clr));
  _slEl=h('div',{cls:'stream',style:'flex:1;overflow-y:auto;min-height:0'});
  const filtered=sl.filter?sl.lines.filter(l=>l.text.toLowerCase().includes(sl.filter.toLowerCase())):sl.lines;
  filtered.forEach(l=>{_slEl.append(slRow(l))});_slR=sl.lines.length;
  _slEl.scrollTop=_slEl.scrollHeight;
  return h('div',{cls:'card',style:'display:flex;flex-direction:column;flex:2;min-height:0;overflow:hidden'},h('h3',{},'System Log'),bar,_slEl);
}
function slRow(l){
  const d=h('div',{style:'padding:2px 0;border-bottom:1px solid #1e293b'});
  if(l.level==='warn')d.style.color='#facc15';
  else if(l.level==='err')d.style.color='#f87171';
  d.textContent=l.text;
  return d;
}
function renderSyslogStream(){
  if(!_slEl||S.page!=='toolbox')return;
  const sl=S.syslog;
  while(_slR<sl.lines.length){
    const l=sl.lines[_slR];
    if(!sl.filter||l.text.toLowerCase().includes(sl.filter.toLowerCase())){
      _slEl.append(slRow(l));
    }
    _slR++;
  }
  _slEl.scrollTop=_slEl.scrollHeight;
}
function renderSyslogFiltered(){
  if(!_slEl)return;
  const sl=S.syslog;
  _slEl.innerHTML='';
  const filtered=sl.filter?sl.lines.filter(l=>l.text.toLowerCase().includes(sl.filter.toLowerCase())):sl.lines;
  filtered.forEach(l=>{_slEl.append(slRow(l))});
  _slEl.scrollTop=_slEl.scrollHeight;
}
async function slStart(){
  const sl=S.syslog;sl.running=true;render();
  try{const r=await fetch('/api/syslog/start',{method:'POST'});
    if(!r.ok){sl.running=false;render()}}
  catch(_){sl.running=false;render()}
}
async function slStop(){
  try{await fetch('/api/syslog/stop',{method:'POST'})}catch(_){}
  S.syslog.running=false;render();
}
function connectWS(){
  if(S.ws)S.ws.close();
  const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{S.connected=true;render()};
  ws.onclose=()=>{S.connected=false;render();setTimeout(connectWS,3000)};
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='status'){S.status=d;if(S.page==='status')updateStatus()}
      else if(d.type==='toolbox'){
        if(S.toolbox){
          if(d.done){S.toolbox.running=false;S.toolbox.lines.push('--- done (exit code: '+d.code+') ---')}
          else if(d.line!=null){S.toolbox.lines.push(d.line)}
          if(S.page==='toolbox')renderToolboxStream();
        }
      }
      else if(d.type==='syslog'){
        if(!S.syslog)S.syslog={lines:[],running:false,filter:''};
        if(d.stopped){S.syslog.running=false;if(S.page==='toolbox')render()}
        else if(d.line!=null){
          S.syslog.lines.push({text:d.line,level:d.level||'info'});
          if(S.syslog.lines.length>200)S.syslog.lines.shift();
          if(S.page==='toolbox')renderSyslogStream();
        }
      }
      else{
        d._ts=new Date().toLocaleTimeString('vi',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
        S.stream.push(d);
        if(S.stream.length>200){
          S.stream.shift();_rendered=Math.max(0,_rendered-1);
          if(_streamEl&&_streamEl.firstChild)_streamEl.removeChild(_streamEl.firstChild);
        }
        if(S.page==='uart'&&_streamEl){
          const row=fmtRow(d);if(row)_streamEl.append(row);_rendered=S.stream.length;
          _streamEl.scrollTop=_streamEl.scrollHeight;
        }
      }
    }catch(_){}
  };
  S.ws=ws;
}
function sendGpio(pin,state){
  if(S.ws&&S.ws.readyState===1)S.ws.send(JSON.stringify({cmd:'gpio',pin:''+pin,state}));
}
async function checkSession(){
  try{const r=await fetch('/api/status');if(r.ok){S.page='status';connectWS()}}catch(_){}
  render();
}
checkSession();
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview - Config Page</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:.9rem;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center}
/* iOS switch */
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;inset:0;background:#475569;border-radius:12px;transition:.2s}
.sw .sl:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:#22c55e}
.sw input:checked+.sl:before{transform:translateX(20px)}
/* Config form - 4 column grid */
.cf{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:10px 32px;align-items:center;font-size:.85rem;color:#94a3b8}
.cf .full{grid-column:2/5}
.cf .lbl{white-space:nowrap;min-width:100px}
.cf .gap{grid-column:1/-1;height:0;border-top:1px solid #334155;margin:2px 0}
.cf input[type=text],.cf input[type=number],.cf input[type=password],.cf select{padding:6px 10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:4px;font-size:.85rem;width:100%}
.cf .sw-wrap{display:flex;align-items:center;justify-content:flex-end}
.save-btn{padding:10px 32px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.9rem;display:block;margin:8px auto 0}
</style>
</head>
<body>
<div class="app">

<!-- General -->
<div class="card">
  <h3>General</h3>
  <div class="cf">
    <span class="lbl">Ten thiet bi</span>
    <input type="text" value="ugate-01" class="full">
  </div>
</div>

<!-- MQTT - ON -->
<div class="card">
  <h3>MQTT <label class="sw"><input type="checkbox" checked onchange="document.getElementById('mqtt-body').style.display=this.checked?'grid':'none'"><span class="sl"></span></label></h3>
  <div class="cf" id="mqtt-body">
    <span class="lbl">Broker</span>
    <input type="text" value="broker.emqx.io" class="full">

    <span class="lbl">Port</span>
    <input type="number" value="8883">
    <div class="sw-wrap" style="grid-column:3/5;justify-content:flex-end"><span class="lbl" style="margin-right:8px">TLS</span><label class="sw"><input type="checkbox" checked><span class="sl"></span></label></div>

    <span class="lbl">Client ID</span>
    <input type="text" value="ugate-01adaaSad">
    <span class="lbl">QoS</span>
    <select><option>0</option><option selected>1</option><option>2</option></select>

    <span class="lbl">Username</span>
    <input type="text" value="">
    <span class="lbl">Password</span>
    <input type="password" value="">

    <div class="gap"></div>

    <span class="lbl">Publish Topic</span>
    <input type="text" value="ugate/data" class="full">

    <span class="lbl">Subscribe Topic</span>
    <input type="text" value="ugate/cmd" class="full">
  </div>
</div>

<!-- HTTP - ON -->
<div class="card">
  <h3>HTTP <label class="sw"><input type="checkbox" checked onchange="document.getElementById('http-body').style.display=this.checked?'grid':'none'"><span class="sl"></span></label></h3>
  <div class="cf" id="http-body">
    <span class="lbl">Method</span>
    <select class="full"><option selected>POST</option><option>GET</option></select>

    <span class="lbl">URL</span>
    <input type="text" value="https://example.com/api/data" class="full">
  </div>
</div>

<!-- TCP - OFF -->
<div class="card">
  <h3>TCP <label class="sw"><input type="checkbox" onchange="document.getElementById('tcp-body').style.display=this.checked?'grid':'none'"><span class="sl"></span></label></h3>
  <div class="cf" id="tcp-body" style="display:none">
    <span class="lbl">Mode</span>
    <select class="full"><option>Server</option><option selected>Client</option></select>

    <span class="lbl">Server Address</span>
    <input type="text" value="192.168.1.100">
    <span class="lbl">Server Port</span>
    <input type="number" value="5000">
  </div>
</div>

<button class="save-btn">Luu cau hinh</button>

</div>
</body>
</html>

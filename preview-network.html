<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>uGate - From UART to the world</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #334155;margin-bottom:16px}
header h1{font-size:1.2rem;color:#38bdf8}
header .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
header .dot.on{background:#22c55e}
header .dot.off{background:#ef4444}
nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
nav button{padding:6px 14px;border:1px solid #334155;background:#1e293b;color:#94a3b8;border-radius:6px;cursor:pointer;font-size:.8rem}
nav button.active{background:#334155;color:#f1f5f9;border-color:#475569}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:.9rem;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.grid div{display:flex;justify-content:space-between;padding:4px 0}
.grid label{color:#64748b;font-size:.85rem}
.grid span{color:#e2e8f0;font-size:.85rem;font-weight:500}
.gpio-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gpio-btn{padding:12px;border:2px solid #334155;border-radius:8px;cursor:pointer;text-align:center;font-weight:600;transition:all .15s}
.gpio-btn.on{background:#166534;border-color:#22c55e;color:#22c55e}
.gpio-btn.off{background:#1e293b;border-color:#475569;color:#94a3b8}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.login input{padding:10px 16px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;border-radius:6px;width:240px;font-size:1rem}
.login button{padding:10px 32px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;font-size:1rem}
.login .error{color:#ef4444;font-size:.85rem}
.cf{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:10px 32px;align-items:center;font-size:.85rem;color:#94a3b8}
.cf .full{grid-column:2/5}
.cf .lbl{white-space:nowrap;min-width:100px}
.cf .gap{grid-column:1/-1;height:0;border-top:1px solid #334155;margin:2px 0}
.cf input[type=text],.cf input[type=number],.cf input[type=password],.cf select{padding:6px 10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:4px;font-size:.85rem;width:100%}
.cf .sw-wrap{display:flex;align-items:center;justify-content:flex-end}
.save-btn{padding:10px 32px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.9rem;display:block;margin:8px auto 0}
.stream{background:#0f172a;border:1px solid #334155;border-radius:4px;padding:8px;max-height:300px;overflow-y:auto;font-family:monospace;font-size:.75rem;color:#94a3b8}
.stream div{padding:2px 0;border-bottom:1px solid #1e293b}
/* iOS-style switch */
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;inset:0;background:#475569;border-radius:12px;transition:.2s}
.sw .sl:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:#22c55e}
.sw input:checked+.sl:before{transform:translateX(20px)}
/* Progress bar */
.pbar{height:8px;background:#334155;border-radius:4px;overflow:hidden;flex:1;margin-left:8px}
.pbar .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pbar-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.pbar-row label{color:#64748b;font-size:.85rem;min-width:60px}
.pbar-row span{color:#e2e8f0;font-size:.85rem;font-weight:500;min-width:72px;text-align:right}
/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:16px 40px;border-radius:10px;font-size:1.1rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;min-width:200px}
.toast.show{opacity:1}
.toast.ok{background:#166534;color:#22c55e;border:2px solid #22c55e}
.toast.err{background:#7f1d1d;color:#ef4444;border:2px solid #ef4444}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:#1e293b;border:1px solid #475569;border-radius:12px;padding:20px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;animation:slideUp .25s}
.modal h3{color:#38bdf8;margin-bottom:12px;font-size:1rem}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.wifi-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #334155;cursor:pointer;border-radius:6px;transition:background .15s}
.wifi-item:hover{background:#334155}
.wifi-signal{display:flex;align-items:flex-end;gap:2px;margin-right:8px}
.wifi-signal i{width:3px;background:#475569;border-radius:1px}
.wifi-signal i.active{background:#22c55e}
.spinner{width:24px;height:24px;border:3px solid #334155;border-top:3px solid #38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* Channel badge */
.ch-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;text-transform:uppercase}
.ch-badge.connected{background:#166534;color:#22c55e}
.ch-badge.disconnected{background:#7f1d1d;color:#ef4444}
.ch-badge.disabled{background:#334155;color:#64748b}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const S={page:'network',ws:null,connected:false,status:{},config:null,stream:[],loginErr:'',password:'',hexView:false,net:null,wifi:{networks:[],scanning:false,status:null},ntp:null,routes:null,newRoute:{name:'',target:'',netmask:'255.255.255.0',gateway:'',interface:'wan'},pendingChanges:false};
function $(s,p){return(p||document).querySelector(s)}
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else if(k==='cls')el.className=v;
    else el.setAttribute(k,v);
  });
  ch.flat().forEach(c=>el.append(typeof c==='string'?c:c));
  return el;
}
function render(){
  const root=$('#app');root.innerHTML='';
  if(S.page==='login'){renderLogin(root);return}
  const pg=S.page;
  root.append(
    h('header',{},h('h1',{},'uGate - From UART to the world'),h('span',{},h('span',{cls:'dot '+(S.connected?'on':'off')}),'WS')),
    renderNav(),
    pg==='status'?renderStatus():pg==='config'?renderConfig():pg==='network'?renderNetwork():pg==='uart'?renderUart():pg==='data'?renderData():h('div',{})
  );
}
function renderLogin(root){
  const inp=h('input',{type:'password',placeholder:'Mật khẩu',value:S.password,oninput:e=>S.password=e.target.value,onkeydown:e=>{if(e.key==='Enter')doLogin()}});
  root.append(h('div',{cls:'login'},h('h1',{style:'color:#38bdf8;font-size:1.5rem'},'uGate - From UART to the world'),inp,
    h('button',{onclick:doLogin},'Đăng nhập'),
    S.loginErr?h('div',{cls:'error'},S.loginErr):h('span',{})
  ));
  setTimeout(()=>inp.focus(),100);
}
async function doLogin(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:S.password})});
  if(r.ok){S.page='status';S.loginErr='';connectWS();render()}
  else{S.loginErr='Sai mật khẩu';render()}
}
function renderNav(){
  const tabs=[['status','Trạng thái'],['config','Cấu hình'],['network','Mạng'],['uart','UART'],['data','Dữ liệu']];
  return h('nav',{},...tabs.map(([id,label])=>h('button',{cls:S.page===id?'active':'',onclick:()=>{S.page=id;render()}},label)));
}
// --- Status page ---
function pbar(id,label,val,max,color,text){
  const pct=max>0?Math.min(100,val/max*100):0;
  // Reuse existing fill element for smooth transition
  const existing=document.querySelector('[data-pbar="'+id+'"]');
  if(existing){
    existing.style.width=pct+'%';existing.style.background=color;
    const sp=existing.closest('.pbar-row').querySelector('span');if(sp)sp.textContent=text;
    return existing.closest('.pbar-row');
  }
  const fill=h('div',{cls:'fill','data-pbar':id,style:'width:0%;background:'+color});
  setTimeout(()=>{fill.style.width=pct+'%'},20);
  return h('div',{cls:'pbar-row'},
    h('label',{},label),
    h('div',{cls:'pbar'},fill),
    h('span',{},text)
  );
}
function chBadge(state,enabled){
  if(enabled===false)return h('span',{cls:'ch-badge disabled'},'off');
  if(state==='connected')return h('span',{cls:'ch-badge connected'},'connected');
  if(state==='waiting')return h('span',{cls:'ch-badge disconnected'},'waiting');
  if(state==='disabled')return h('span',{cls:'ch-badge disabled'},'off');
  return h('span',{cls:'ch-badge disconnected'},state||'disconnected');
}
function renderStatus(){
  const s=S.status||{};const u=s.uart||{};const m=s.mqtt||{};const hp=s.http||{};const t=s.tcp||{};const g=s.gpio||[];
  const cpu=s.cpu||0;const ru=s.ram_used||0;const rt=s.ram_total||0;
  function badge(ch,state,enabled){
    const cls=enabled===false||state==='disabled'?'disabled':state==='connected'?'connected':'disconnected';
    const txt=enabled===false?'off':state||'disconnected';
    return h('span',{cls:'ch-badge '+cls,'data-badge':ch},txt);
  }
  return h('div',{},
    h('div',{cls:'card'},h('h3',{},'Hệ thống'),
      h('div',{cls:'grid'},
        h('div',{},h('label',{},'Phiên bản'),h('span',{'data-f':'ver'},s.version||'-')),
        h('div',{},h('label',{},'Uptime'),h('span',{'data-f':'up'},s.uptime||'-'))
      ),
      pbar('cpu','CPU',cpu,100,cpu>80?'#ef4444':cpu>50?'#f59e0b':'#22c55e',cpu+'%'),
      pbar('ram','RAM',ru,rt,ru/rt>0.8?'#ef4444':ru/rt>0.5?'#f59e0b':'#22c55e',ru+'/'+rt+' MB')
    ),
    h('div',{cls:'card'},
      h('h3',{},'Kênh truyền',
        h('div',{style:'display:flex;gap:6px;flex-wrap:wrap'},
          h('span',{style:'font-size:.7rem;color:#64748b'},'MQTT:'),badge('mqtt',m.state,m.enabled),
          h('span',{style:'font-size:.7rem;color:#64748b;margin-left:6px'},'HTTP:'),badge('http',hp.state,hp.enabled),
          h('span',{style:'font-size:.7rem;color:#64748b;margin-left:6px'},'TCP:'),badge('tcp',t.state,t.enabled)
        )
      ),
      h('div',{cls:'grid'},
        h('div',{},h('label',{},'UART RX'),h('span',{'data-f':'urx'},''+(u.rx_frames??0)+' frames / '+(u.rx_bytes??0)+' B')),
        h('div',{},h('label',{},'UART TX'),h('span',{'data-f':'utx'},''+(u.tx_frames??0)+' frames / '+(u.tx_bytes??0)+' B')),
        h('div',{},h('label',{},'UART config'),h('span',{'data-f':'ucfg'},u.config||'-')),
        h('div',{},h('label',{},'MQTT pub'),h('span',{'data-f':'mpub'},''+(m.published??0)+' ok / '+(m.failed??0)+' fail')),
        h('div',{},h('label',{},'HTTP sent'),h('span',{'data-f':'hsnt'},''+(hp.sent??0)+' ok / '+(hp.failed??0)+' fail')),
        h('div',{},h('label',{},'TCP conn'),h('span',{'data-f':'tconn'},''+(t.connections??0)))
      )
    ),
    h('div',{cls:'card'},h('h3',{},'GPIO'),h('div',{cls:'gpio-btns'},...[0,1,2,3].map(i=>
      h('div',{cls:'gpio-btn '+(g[i]?'on':'off'),'data-gpio':''+i,onclick:()=>sendGpio(i+1,'toggle')},'Pin '+(i+1)+'\n'+(g[i]?'ON':'OFF'))
    )))
  );
}
function updateStatus(){
  // First render: full render; subsequent: in-place update for smooth transitions
  if(!document.querySelector('[data-pbar="cpu"]')){render();return}
  const s=S.status||{};const u=s.uart||{};const m=s.mqtt||{};const hp=s.http||{};const t=s.tcp||{};const g=s.gpio||[];
  const cpu=s.cpu||0;const ru=s.ram_used||0;const rt=s.ram_total||0;
  // Update progress bars (reuse existing elements for animation)
  pbar('cpu','CPU',cpu,100,cpu>80?'#ef4444':cpu>50?'#f59e0b':'#22c55e',cpu+'%');
  pbar('ram','RAM',ru,rt,ru/rt>0.8?'#ef4444':ru/rt>0.5?'#f59e0b':'#22c55e',ru+'/'+rt+' MB');
  // Update text fields via data-field
  const f=k=>document.querySelector('[data-f="'+k+'"]');
  const set=(k,v)=>{const el=f(k);if(el)el.textContent=v};
  set('ver',s.version||'-');set('up',s.uptime||'-');
  set('urx',''+(u.rx_frames??0)+' frames / '+(u.rx_bytes??0)+' B');
  set('utx',''+(u.tx_frames??0)+' frames / '+(u.tx_bytes??0)+' B');
  set('ucfg',u.config||'-');
  set('mpub',''+(m.published??0)+' ok / '+(m.failed??0)+' fail');
  set('hsnt',''+(hp.sent??0)+' ok / '+(hp.failed??0)+' fail');
  set('tconn',''+(t.connections??0));
  // Update GPIO buttons
  [0,1,2,3].forEach(i=>{
    const btn=document.querySelector('[data-gpio="'+i+'"]');
    if(btn){btn.className='gpio-btn '+(g[i]?'on':'off');btn.textContent='Pin '+(i+1)+'\n'+(g[i]?'ON':'OFF')}
  });
  // Update badges
  ['mqtt','http','tcp'].forEach(ch=>{
    const badge=document.querySelector('[data-badge="'+ch+'"]');
    if(!badge)return;
    const obj=ch==='mqtt'?m:ch==='http'?hp:t;
    const st=obj.state;const en=obj.enabled;
    badge.className='ch-badge '+(en===false||st==='disabled'?'disabled':st==='connected'?'connected':'disconnected');
    badge.textContent=en===false?'off':st||'disconnected';
  });
}
// --- Config helpers (4-column grid) ---
function lbl(text){return h('span',{cls:'lbl'},text)}
function gap(){return h('div',{cls:'gap'})}
function inp(type,obj,key,full){
  return h('input',{type,cls:full?'full':'',value:type==='number'?(obj[key]||0):(obj[key]||''),oninput:e=>{obj[key]=type==='number'?+e.target.value:e.target.value}});
}
function slct(obj,key,opts,full,cb){
  const s=h('select',{cls:full?'full':'',onchange:e=>{obj[key]=e.target.value;if(cb)cb()}});
  opts.forEach(([v,t])=>{const o=h('option',{value:v},t);if(''+obj[key]===v)o.selected=true;s.append(o)});
  return s;
}
function swTog(obj,key){
  return h('label',{cls:'sw'},h('input',{type:'checkbox',...(obj[key]?{checked:''}:{}),onchange:e=>{obj[key]=e.target.checked}}),h('span',{cls:'sl'}));
}
function chHdr(title,obj){
  const tog=h('input',{type:'checkbox',...(obj.enabled?{checked:''}:{}),onchange:e=>{obj.enabled=e.target.checked;render()}});
  return h('h3',{},title,h('label',{cls:'sw'},tog,h('span',{cls:'sl'})));
}
// --- Config page ---
function renderConfig(){
  if(!S.config){loadConfig();return h('div',{cls:'card'},'Đang tải...')}
  const c=S.config;
  // General
  const general=h('div',{cls:'card'},h('h3',{},'General'),
    h('div',{cls:'cf'},lbl('Tên thiết bị'),inp('text',c.general,'device_name',true)));
  // MQTT
  const mqtt=h('div',{cls:'card'},chHdr('MQTT',c.mqtt),
    ...(c.mqtt.enabled?[h('div',{cls:'cf'},
      lbl('Broker'),inp('text',c.mqtt,'broker',true),
      lbl('Port'),inp('number',c.mqtt,'port'),
      h('div',{cls:'sw-wrap',style:'grid-column:3/5'},h('span',{cls:'lbl',style:'margin-right:8px;min-width:auto'},'TLS'),swTog(c.mqtt,'tls')),
      lbl('Client ID'),inp('text',c.mqtt,'client_id'),lbl('QoS'),slct(c.mqtt,'qos',[['0','0'],['1','1'],['2','2']]),
      lbl('Username'),inp('text',c.mqtt,'username'),lbl('Mật khẩu'),inp('password',c.mqtt,'password'),
      gap(),
      lbl('Publish Topic'),inp('text',c.mqtt,'topic',true),
      lbl('Subscribe Topic'),inp('text',c.mqtt,'sub_topic',true)
    )]:[])
  );
  // HTTP
  const http=h('div',{cls:'card'},chHdr('HTTP',c.http),
    ...(c.http.enabled?[h('div',{cls:'cf'},
      lbl('Phương thức'),slct(c.http,'method',[['post','POST'],['get','GET']],true),
      lbl('URL'),inp('text',c.http,'url',true)
    )]:[])
  );
  // TCP
  const tcpFields=[lbl('Chế độ'),slct(c.tcp,'mode',[['server','Server (lắng nghe)'],['client','Client (kết nối tới)']],true,()=>render())];
  if(c.tcp.mode==='server'){tcpFields.push(lbl('Cổng lắng nghe'),inp('number',c.tcp,'server_port',true))}
  if(c.tcp.mode==='client'){tcpFields.push(lbl('Địa chỉ server'),inp('text',c.tcp,'client_host'),lbl('Cổng đích'),inp('number',c.tcp,'client_port'))}
  const tcp=h('div',{cls:'card'},chHdr('TCP',c.tcp),
    ...(c.tcp.enabled?[h('div',{cls:'cf'},...tcpFields)]:[])
  );
  return h('div',{},general,mqtt,http,tcp,h('button',{cls:'save-btn',onclick:saveConfig},'Lưu cấu hình'));
}
// --- UART page ---
function renderUart(){
  if(!S.config){loadConfig();return h('div',{cls:'card'},'Đang tải...')}
  const c=S.config;const fm=c.uart.frame_mode;
  const bauds=[['9600','9600'],['19200','19200'],['38400','38400'],['57600','57600'],['115200','115200'],['230400','230400'],['460800','460800'],['921600','921600']];
  const fields=[
    lbl('Baudrate'),slct(c.uart,'baudrate',bauds),lbl('Data Bits'),slct(c.uart,'data_bits',[['7','7'],['8','8']]),
    lbl('Parity'),slct(c.uart,'parity',[['none','None'],['even','Even'],['odd','Odd']]),lbl('Stop Bits'),slct(c.uart,'stop_bits',[['1','1'],['2','2']]),
    lbl('Frame Mode'),slct(c.uart,'frame_mode',[['none','None (Gap)'],['frame','Frame (Fixed)'],['modbus','Modbus RTU']],true,()=>render())
  ];
  if(fm==='none')fields.push(lbl('Gap (ms)'),inp('number',c.uart,'gap_ms',true));
  if(fm==='frame'){fields.push(lbl('Frame Length'),inp('number',c.uart,'frame_length'),lbl('Frame Timeout (ms)'),inp('number',c.uart,'frame_timeout_ms'))}
  if(fm==='modbus')fields.push(lbl('Frame Timeout (ms)'),inp('number',c.uart,'frame_timeout_ms',true));
  return h('div',{},h('div',{cls:'card'},h('h3',{},'UART'),h('div',{cls:'cf'},...fields)),h('button',{cls:'save-btn',onclick:saveConfig},'Lưu cấu hình'));
}
async function loadConfig(){
  const r=await fetch('/api/config');if(r.ok){S.config=await r.json();render();}
}
function toast(msg,type){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.append(t)}
  t.textContent=msg;t.className='toast '+(type||'ok')+' show';
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}
async function saveConfig(){
  try{
    const r=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S.config)});
    if(r.ok)toast('Đã lưu cấu hình','ok');else toast('Lưu thất bại','err');
  }catch(e){toast('Lỗi kết nối','err')}
}
function fmtRow(d){
  if(!d||!d.type)return null;
  const isRx=d.dir!=='tx';
  let content='';
  if(d.hex){
    if(S.hexView){
      content=d.hex.match(/.{1,2}/g).join(' ').toUpperCase();
    }else{
      const bytes=d.hex.match(/.{1,2}/g)||[];
      content=bytes.map(b=>{const c=parseInt(b,16);return c>=32&&c<127?String.fromCharCode(c):c===10?'':c===13?'':''}).join('');
    }
  }
  const row=h('div',{style:'display:flex;gap:8px;padding:1px 0;border-bottom:1px solid #1e293b'},
    h('span',{style:'color:#64748b;min-width:64px'},d._ts||''),
    h('span',{style:'color:'+(isRx?'#22c55e':'#f59e0b')+';font-weight:600;min-width:20px'},isRx?'RX':'TX'),
    h('span',{style:'color:#38bdf8;min-width:28px'},'['+d.len+']'),
    h('span',{},content)
  );
  return row;
}
let _streamEl=null,_rendered=0;
function renderData(){
  // Incremental: chỉ append rows mới thay vì rebuild toàn bộ
  if(_streamEl&&S.page==='data'){
    while(_rendered<S.stream.length){
      const row=fmtRow(S.stream[_rendered]);
      if(row)_streamEl.append(row);
      _rendered++;
    }
    _streamEl.scrollTop=_streamEl.scrollHeight;
    return _streamEl.parentElement;
  }
  _rendered=0;
  _streamEl=h('div',{cls:'stream',style:'max-height:calc(100vh - 220px);overflow-y:auto'});
  S.stream.forEach((d,i)=>{const r=fmtRow(d);if(r)_streamEl.append(r);_rendered=i+1});
  setTimeout(()=>{if(_streamEl)_streamEl.scrollTop=_streamEl.scrollHeight},10);
  const toolbar=h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'},
    h('h3',{style:'margin:0;font-size:.9rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em'},'UART Real-time'),
    h('div',{style:'display:flex;align-items:center;gap:12px'},
      h('label',{style:'font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:6px'},
        'HEX',h('label',{cls:'sw'},h('input',{type:'checkbox',...(!S.hexView?{checked:''}:{}),onchange:e=>{S.hexView=!e.target.checked;_streamEl=null;_rendered=0;render()}}),h('span',{cls:'sl'})),'TEXT'
      ),
      h('button',{style:'padding:4px 12px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:4px;cursor:pointer;font-size:.75rem',onclick:()=>{S.stream=[];_streamEl=null;_rendered=0;render()}},'Xoá')
    )
  );
  return h('div',{cls:'card',style:'padding-bottom:8px'},toolbar,_streamEl);
}
// --- Network page ---
function renderNetwork(){
  if(!S.wifi.status)loadWifiStatus().then(render);
  checkPendingChanges();
  const banner=S.pendingChanges?h('div',{style:'background:#92400e;border:1px solid #f59e0b;border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center'},
    h('span',{style:'color:#fbbf24;font-weight:600;font-size:.85rem'},'⚠ Có thay đổi chưa lưu vào flash'),
    h('div',{style:'display:flex;gap:8px'},
      h('button',{style:'padding:6px 16px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;cursor:pointer;font-size:.8rem',onclick:revertChanges},'Huỷ nháp'),
      h('button',{style:'padding:6px 16px;background:#16a34a;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.8rem',onclick:applyChanges},'Áp dụng & Lưu flash')
    )
  ):h('div',{});
  return h('div',{},banner,renderWifi(),renderLanWan(),renderNtp(),renderRoutes());
}
function signalBars(dbm){
  const strength=dbm>-50?4:dbm>-60?3:dbm>-70?2:1;
  return h('span',{cls:'wifi-signal'},...[6,10,14,18].map((ht,i)=>h('i',{style:'height:'+ht+'px',cls:i<strength?'active':''})));
}
function renderWifi(){
  const w=S.wifi;
  const statusEl=w.status?h('div',{cls:'grid',style:'margin-bottom:12px'},
    h('div',{},h('label',{},'Trạng thái'),h('span',{style:'color:'+(w.status.connected?'#22c55e':'#ef4444')},w.status.connected?'Đã kết nối':'Ngắt')),
    w.status.connected?h('div',{},h('label',{},'SSID'),h('span',{},w.status.ssid)):h('div',{}),
    w.status.connected?h('div',{},h('label',{},'Tín hiệu'),h('span',{},w.status.signal+' dBm')):h('div',{}),
    w.status.connected?h('div',{},h('label',{},'IP'),h('span',{},w.status.ip||'-')):h('div',{})
  ):h('div',{});
  const scanBtn=h('button',{cls:'save-btn',style:'margin:0;padding:6px 16px;font-size:.8rem',onclick:scanWifi},'Quét WiFi');
  const disconnBtn=w.status&&w.status.connected?h('button',{cls:'save-btn',style:'margin:0 0 0 8px;padding:6px 16px;font-size:.8rem;background:#ef4444',onclick:disconnectWifi},'Ngắt kết nối'):h('span',{});
  const connForm=w._sel?h('div',{style:'display:flex;gap:8px;align-items:center;margin-top:10px'},
    h('span',{style:'color:#38bdf8;font-size:.85rem'},w._sel.ssid),
    h('input',{type:'password',id:'wifi-pwd',placeholder:'Mật khẩu',style:'flex:1;padding:6px 10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:4px;font-size:.85rem',oninput:e=>{S.wifi._pwd=e.target.value},onkeydown:e=>{if(e.key==='Enter')connectWifi(w._sel.ssid,S.wifi._pwd||'')}}),
    h('button',{cls:'save-btn',style:'margin:0;padding:6px 16px;font-size:.8rem',onclick:()=>connectWifi(w._sel.ssid,S.wifi._pwd||'')},'Kết nối')
  ):h('div',{});
  return h('div',{cls:'card'},h('h3',{},'WiFi',h('div',{style:'display:flex'},scanBtn,disconnBtn)),statusEl,connForm);
}
function showWifiModal(){
  const existing=document.getElementById('wifi-modal');if(existing)existing.remove();
  const overlay=h('div',{cls:'modal-overlay',id:'wifi-modal',onclick:e=>{if(e.target===overlay)overlay.remove()}});
  const modal=h('div',{cls:'modal',style:'position:relative'});
  const content=h('div',{id:'wifi-modal-content'});
  modal.append(h('h3',{},'Quét WiFi'),h('button',{cls:'modal-close',onclick:()=>overlay.remove()},'✕'),content);
  overlay.append(modal);document.body.append(overlay);
  return content;
}
function updateWifiModal(content,networks){
  content.innerHTML='';
  if(!networks.length){content.append(h('div',{style:'color:#94a3b8;text-align:center;padding:20px'},'Không tìm thấy WiFi nào'));return}
  networks.sort((a,b)=>b.signal-a.signal);
  networks.forEach(n=>{
    content.append(h('div',{cls:'wifi-item',onclick:()=>{
      S.wifi._sel=n;S.wifi._pwd='';
      document.getElementById('wifi-modal').remove();
      render();
      setTimeout(()=>{const el=document.getElementById('wifi-pwd');if(el)el.focus()},100);
    }},
      h('div',{},h('div',{style:'color:#e2e8f0;font-weight:500'},n.ssid),h('div',{style:'color:#64748b;font-size:.75rem'},n.encryption)),
      h('div',{style:'display:flex;align-items:center;gap:8px'},signalBars(n.signal),h('span',{style:'color:#64748b;font-size:.75rem'},n.signal+' dBm'))
    ));
  });
}
function renderLanWan(){
  if(!S.net){loadNetwork();return h('div',{cls:'card'},'Đang tải...')}
  const n=S.net;
  const ifaceCard=(name,obj,subtitle)=>{
    const fields=[lbl('Giao thức'),slct(obj,'proto',[['dhcp','DHCP'],['static','Static IP']],true,()=>render())];
    if(obj.proto==='static'){
      fields.push(lbl('IP'),inp('text',obj,'ipaddr',true),lbl('Netmask'),inp('text',obj,'netmask'),lbl('Gateway'),inp('text',obj,'gateway'),lbl('DNS'),inp('text',obj,'_dns',true));
    }
    return h('div',{style:'margin-bottom:8px'},h('div',{style:'display:flex;align-items:baseline;gap:8px;margin-bottom:6px'},h('span',{style:'font-weight:600;color:#38bdf8;font-size:.85rem'},name.toUpperCase()),subtitle?h('span',{style:'color:#64748b;font-size:.75rem'},subtitle):h('span',{})),h('div',{cls:'cf'},...fields));
  };
  // Flatten DNS array to comma string for editing
  if(!n.lan._dns)n.lan._dns=(n.lan.dns||[]).join(',');
  if(!n.wan._dns)n.wan._dns=(n.wan.dns||[]).join(',');
  // Metric priority
  if(!n._metricWan)n._metricWan=n.wan.metric||'10';
  if(!n._metricWwan)n._metricWwan=n.wwan_metric||'20';
  const metricSection=h('div',{style:'margin-top:8px;padding-top:8px;border-top:1px solid #334155'},
    h('div',{style:'font-weight:600;color:#38bdf8;margin-bottom:6px;font-size:.85rem'},'Ưu tiên mạng (Metric thấp = ưu tiên cao)'),
    h('div',{cls:'cf'},
      lbl('ETH WAN'),inp('number',n,'_metricWan'),lbl('WiFi WAN'),inp('number',n,'_metricWwan')
    ),
    h('button',{cls:'save-btn',style:'margin-top:8px',onclick:saveMetrics},'Lưu ưu tiên')
  );
  return h('div',{cls:'card'},h('h3',{},'LAN / WAN'),ifaceCard('lan',n.lan,'AP WiFi LAN · phy0-ap0'),ifaceCard('wan',n.wan,'ETH WAN · eth0.2'),metricSection,
    h('button',{cls:'save-btn',onclick:saveNetwork},'Lưu cấu hình mạng'));
}
function renderNtp(){
  if(!S.ntp){loadNtp();return h('div',{cls:'card'},'Đang tải...')}
  const n=S.ntp;if(!n._servers)n._servers=(n.servers||[]).join(',');
  return h('div',{cls:'card'},h('h3',{},'NTP',h('div',{style:'display:flex;gap:8px'},
    h('button',{cls:'save-btn',style:'margin:0;padding:4px 12px;font-size:.75rem;background:#334155',onclick:syncNtp},'Đồng bộ ngay'))),
    h('div',{cls:'cf'},
      lbl('Bật'),h('div',{cls:'sw-wrap'},swTog(n,'enabled')),lbl('Timezone'),slct(n,'timezone',[['ICT-7','Asia/Ho_Chi_Minh (UTC+7)'],['CST-8','Asia/Shanghai (UTC+8)'],['JST-9','Asia/Tokyo (UTC+9)'],['WIB-7','Asia/Jakarta (UTC+7)'],['SGT-8','Asia/Singapore (UTC+8)'],['<+09>-9','Asia/Seoul (UTC+9)'],['IST-5:30','Asia/Kolkata (UTC+5:30)'],['GST-4','Asia/Dubai (UTC+4)'],['UTC0','UTC'],['GMT0','Europe/London (GMT)'],['CET-1','Europe/Paris (UTC+1)'],['EET-2','Europe/Bucharest (UTC+2)'],['EST5EDT','US/Eastern'],['CST6CDT','US/Central'],['MST7MDT','US/Mountain'],['PST8PDT','US/Pacific'],['AEST-10','Australia/Sydney (UTC+10)']]),
      lbl('NTP Servers'),inp('text',n,'_servers',true)
    ),
    h('button',{cls:'save-btn',onclick:saveNtp},'Lưu NTP'));
}
// Network API calls
async function scanWifi(){
  const content=showWifiModal();
  content.append(h('div',{cls:'spinner'}),h('div',{style:'text-align:center;color:#94a3b8;margin-top:8px'},'Đang quét...'));
  try{const r=await fetch('/api/wifi/scan');if(r.ok){const d=await r.json();S.wifi.networks=d.networks||[];updateWifiModal(content,S.wifi.networks)}else{content.innerHTML='';content.append(h('div',{style:'color:#ef4444;text-align:center;padding:20px'},'Lỗi quét WiFi'))}}
  catch(_){content.innerHTML='';content.append(h('div',{style:'color:#ef4444;text-align:center;padding:20px'},'Lỗi kết nối'))}
}
async function loadWifiStatus(){
  try{const r=await fetch('/api/wifi/status');if(r.ok){S.wifi.status=await r.json();return}}catch(_){}
  if(!S.wifi.status)S.wifi.status={connected:false,ssid:'',signal:0,ip:''};
}
async function connectWifi(ssid,pwd){
  try{
    const r=await fetch('/api/wifi/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid,password:pwd,encryption:'psk2'})});
    if(r.ok){toast('Đang kết nối WiFi...','ok');S.wifi._sel=null;setTimeout(()=>{loadWifiStatus().then(render)},5000)}
    else toast('Lỗi kết nối','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function disconnectWifi(){
  try{await fetch('/api/wifi/disconnect',{method:'POST'});toast('Đang ngắt WiFi...','ok');setTimeout(()=>{loadWifiStatus().then(render)},5000)}catch(_){}
}
async function loadNetwork(){
  try{const r=await fetch('/api/network');if(r.ok){S.net=await r.json();render();return}}catch(_){}
  S.net={lan:{name:'lan',proto:'dhcp',ipaddr:'',netmask:'255.255.255.0',gateway:'',dns:[]},wan:{name:'wan',proto:'dhcp',ipaddr:'',netmask:'255.255.255.0',gateway:'',dns:[]}};render();
}
async function saveNetwork(){
  for(const name of ['lan','wan']){
    const obj=S.net[name];const body={interface:name,proto:obj.proto};
    if(obj.proto==='static'){body.ipaddr=obj.ipaddr;body.netmask=obj.netmask;body.gateway=obj.gateway;body.dns=obj._dns||''}
    try{
      const r=await fetch('/api/network',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){toast('Lỗi lưu '+name,'err');return}
    }catch(_){toast('Lỗi kết nối','err');return}
  }
  S.pendingChanges=true;toast('Đã lưu nháp (RAM). Ấn "Áp dụng" để ghi flash.','ok');render();
}
async function saveMetrics(){
  const n=S.net;
  for(const [iface,val] of [['wan',n._metricWan],['wwan',n._metricWwan]]){
    try{await fetch('/api/interface/metric',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({interface:iface,metric:+val})})}catch(_){}
  }
  S.pendingChanges=true;toast('Đã lưu nháp (RAM). Ấn "Áp dụng" để ghi flash.','ok');render();
}
async function loadNtp(){
  try{const r=await fetch('/api/ntp');if(r.ok){S.ntp=await r.json();render();return}}catch(_){}
  S.ntp={enabled:true,servers:[],timezone:'ICT-7',zonename:'Asia/Ho_Chi_Minh'};render();
}
async function saveNtp(){
  const n=S.ntp;const body={enabled:!!n.enabled,timezone:n.timezone||'',zonename:n.zonename||'',servers:n._servers||''};
  try{
    const r=await fetch('/api/ntp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){S.pendingChanges=true;toast('Đã lưu nháp (RAM). Ấn "Áp dụng" để ghi flash.','ok');render()}else toast('Lỗi lưu NTP','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
// Interface name mapping
const IFACE_MAP={'eth0.2':'ETH WAN','eth0.2@eth0':'ETH WAN','phy0-sta0':'WiFi WAN','phy0-ap0':'AP WiFi LAN','br-lan':'LAN Bridge','lo':'Loopback'};
function ifaceName(raw){return IFACE_MAP[raw]||raw}
function ifaceBadge(raw){
  const name=ifaceName(raw);
  const color=name.includes('ETH')?'#3b82f6':name.includes('WiFi WAN')?'#f59e0b':name.includes('AP')?'#22c55e':'#64748b';
  return h('span',{style:'display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:'+color+'22;color:'+color+';border-radius:4px;font-size:.75rem;font-weight:600'},name);
}
// Routes
function renderRoutes(){
  if(!S.routes){loadRoutes();return h('div',{cls:'card'},'Đang tải...')}
  const routes=S.routes.routes||[];
  const r=S.newRoute;
  // Route table
  const thead=h('tr',{},
    ...[['Đích','25%'],['Gateway','20%'],['Interface','20%'],['Metric','10%'],['Scope','10%']].map(([t,w])=>
      h('th',{style:'text-align:left;padding:6px 8px;color:#64748b;font-size:.75rem;font-weight:600;border-bottom:1px solid #334155;width:'+w},t)
    )
  );
  const tbody=routes.map(rt=>h('tr',{},
    h('td',{style:'padding:6px 8px;font-size:.8rem;color:#e2e8f0;font-family:monospace'},rt.dest),
    h('td',{style:'padding:6px 8px;font-size:.8rem;color:#94a3b8;font-family:monospace'},rt.via),
    h('td',{style:'padding:6px 8px'},ifaceBadge(rt.dev)),
    h('td',{style:'padding:6px 8px;font-size:.8rem;color:#94a3b8;text-align:center'},rt.metric),
    h('td',{style:'padding:6px 8px;font-size:.8rem;color:#64748b'},rt.scope)
  ));
  const table=routes.length?h('table',{style:'width:100%;border-collapse:collapse;margin-bottom:12px'},h('thead',{},thead),h('tbody',{},...tbody))
    :h('div',{style:'color:#64748b;font-size:.85rem;margin-bottom:12px'},'Chưa có route nào');
  // Add route form
  return h('div',{cls:'card'},h('h3',{},'Routing'),
    h('div',{style:'font-weight:600;color:#38bdf8;margin-bottom:6px;font-size:.85rem'},'Bảng định tuyến'),table,
    h('div',{style:'font-weight:600;color:#38bdf8;margin-bottom:6px;font-size:.85rem'},'Thêm static route'),
    h('div',{cls:'cf'},
      lbl('Tên'),inp('text',r,'name'),lbl('Interface'),slct(r,'interface',[['wan','ETH WAN'],['wwan','WiFi WAN']]),
      lbl('Target'),inp('text',r,'target'),lbl('Netmask'),inp('text',r,'netmask'),
      lbl('Gateway'),inp('text',r,'gateway',true)
    ),
    h('button',{cls:'save-btn',onclick:addRoute},'Thêm route')
  );
}
async function loadRoutes(){
  try{const r=await fetch('/api/routes');if(r.ok){S.routes=await r.json();render();return}}catch(_){}
  S.routes={current_table:''};render();
}
async function addRoute(){
  const r=S.newRoute;
  if(!r.name||!r.target||!r.gateway){toast('Điền đầy đủ thông tin','err');return}
  try{
    const res=await fetch('/api/routes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)});
    if(res.ok){toast('Đã thêm route','ok');S.routes=null;S.newRoute={name:'',target:'',netmask:'255.255.255.0',gateway:'',interface:'wan'};render()}
    else{const d=await res.json();toast(d.error||'Lỗi','err')}
  }catch(_){toast('Lỗi kết nối','err')}
}
async function checkPendingChanges(){
  try{const r=await fetch('/api/network/changes');if(r.ok){const d=await r.json();const had=S.pendingChanges;S.pendingChanges=!!d.pending;if(had!==S.pendingChanges)render()}}catch(_){}
}
async function applyChanges(){
  try{
    const r=await fetch('/api/network/apply',{method:'POST'});
    if(r.ok){toast('Đã lưu vào flash, đang khởi động lại...','ok');S.pendingChanges=false;render()}
    else toast('Lỗi áp dụng','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function revertChanges(){
  try{
    const r=await fetch('/api/network/revert',{method:'POST'});
    if(r.ok){toast('Đã huỷ thay đổi','ok');S.pendingChanges=false;S.net=null;S.ntp=null;render()}
    else toast('Lỗi huỷ','err');
  }catch(_){toast('Lỗi kết nối','err')}
}
async function syncNtp(){
  try{const r=await fetch('/api/ntp/sync',{method:'POST'});if(r.ok){const d=await r.json();toast('Đã đồng bộ ('+d.method+')','ok')}else toast('Lỗi sync','err')}catch(_){toast('Lỗi kết nối','err')}
}
function connectWS(){
  if(S.ws)S.ws.close();
  const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{S.connected=true;render()};
  ws.onclose=()=>{S.connected=false;render();setTimeout(connectWS,3000)};
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='status'){S.status=d;if(S.page==='status')updateStatus()}
      else{
        d._ts=new Date().toLocaleTimeString('vi',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
        S.stream.push(d);
        if(S.stream.length>200){
          S.stream.shift();_rendered=Math.max(0,_rendered-1);
          if(_streamEl&&_streamEl.firstChild)_streamEl.removeChild(_streamEl.firstChild);
        }
        if(S.page==='data'&&_streamEl){
          const row=fmtRow(d);if(row)_streamEl.append(row);_rendered=S.stream.length;
          _streamEl.scrollTop=_streamEl.scrollHeight;
        }
      }
    }catch(_){}
  };
  S.ws=ws;
}
function sendGpio(pin,state){
  if(S.ws&&S.ws.readyState===1)S.ws.send(JSON.stringify({cmd:'gpio',pin:''+pin,state}));
}
async function checkSession(){
  try{const r=await fetch('/api/status');if(r.ok){S.page='status';connectWS()}}catch(_){}
  render();
}
render();
</script>
